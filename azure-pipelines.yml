trigger:
- main

pool:
  name: 'ops-agent'  # Changed from 'Default' to match your actual pool name

variables:
  dockerRegistryServiceConnection: 'docker-hub-connection'
  imageRepository: 'raveendra11/dogood-web'
  tag: '$(Build.BuildId)'
  kubeconfigPath: '/home/admin/mgmt/mgmt-eks-a-cluster.kubeconfig'  # Using 'admin' username

stages:
- stage: Build
  displayName: Build and Push Image
  jobs:  
  - job: Build
    steps:
    - checkout: self
      fetchDepth: 0
      
    - task: Docker@2
      displayName: Build and push Docker image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: Deploy to EKS Anywhere
  dependsOn: Build
  jobs:
  - job: Deploy
    steps:
    - checkout: self
      fetchDepth: 0
      
    - script: |
        echo "Checking kubeconfig file..."
        ls -la $(kubeconfigPath)
        
        echo "Testing cluster connection..."
        kubectl --kubeconfig=$(kubeconfigPath) get nodes
      displayName: 'Verify Cluster Access'
      
    - script: |
        echo "Deploying to Kubernetes..."
        kubectl --kubeconfig=$(kubeconfigPath) apply -f k8s/deployment.yaml
        kubectl --kubeconfig=$(kubeconfigPath) apply -f k8s/service.yaml
        
        echo "Waiting for deployment to be ready..."
        kubectl --kubeconfig=$(kubeconfigPath) rollout status deployment/dogood-web-deployment --timeout=120s
      displayName: 'Deploy Application'
      
    - script: |
        echo "=== Deployment Status ==="
        kubectl --kubeconfig=$(kubeconfigPath) get deployments
        echo ""
        echo "=== Pod Status ==="
        kubectl --kubeconfig=$(kubeconfigPath) get pods
        echo ""
        echo "=== Service Status ==="
        kubectl --kubeconfig=$(kubeconfigPath) get svc
      displayName: 'Verify Deployment'
