trigger:
- main # Triggers the pipeline when you push to the main branch

pool:
  name: 'Default' # Uses your self-hosted agent inside the VirtualBox VM

variables:
  dockerRegistryServiceConnection: 'docker-hub-connection'
  imageRepository: 'raveendra11/dogood-web'
  tag: '$(Build.BuildId)'
  kubernetesServiceConnection: 'eks-anywhere-k8s-connection'

stages:
- stage: Build
  displayName: Build and Push Image
  jobs:  
  - job: Build
    steps:
    - task: Docker@2
      displayName: Build and push Docker image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: Deploy to EKS Anywhere
  dependsOn: Build
  jobs:
  - job: Deploy
    steps:
    - task: KubernetesManifest@0
      displayName: Deploy to Kubernetes cluster
      inputs:
        action: 'deploy'
        kubernetesServiceConnection: '$(kubernetesServiceConnection)'
        namespace: 'default'
        manifests: |
          k8s/deployment.yaml
          k8s/service.yaml
        # This automatically updates the image tag in deployment.yaml to the newly built image
        containers: '$(imageRepository):$(tag)' 
